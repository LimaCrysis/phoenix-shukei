<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>集計アプリ</title>
<link rel="stylesheet" href="style.css?v=2.3.0">
</head>
<body>
<div class="app">
  <header>
    <h1>集計アプリ</h1>
    <div class="version">Ver.2.3.0</div>
    <div id="saveStatus" class="save-status">未保存</div>
  </header>

  <section class="panel">
    <div class="date-wrap">
      <label for="workDate">日付</label>
      <input id="workDate" type="date">
    </div>
  </section>

  <main id="workers"></main>

  <button id="addWorkerBtn" class="add-worker" type="button">＋ 運転手を追加</button>

  <section class="grand">
    <span>総合計</span>
    <strong id="grandTotal">0円</strong>
  </section>

  <section class="actions">
    <button id="saveBtn" class="action primary" type="button">保存</button>
    <button id="pdfBtn" class="action" type="button">PDF保存</button>
    <button id="settingsBtn" class="action" type="button">場所単価</button>
    <button id="resetBtn" class="action danger" type="button">全員リセット</button>
  </section>

  <section class="panel history-panel">
    <div class="history-head">
      <h2>保存履歴</h2>
      <span id="historyCount">0件</span>
    </div>
    <input id="historySearch" class="search-input" type="text" placeholder="日付・運転手名で検索">
    <div id="historyList"></div>
  </section>

  <div class="notice">運転手別の回数と金額を集計できます</div>
</div>

<dialog id="settingsDialog">
  <form id="settingsForm" class="settings-modal" method="dialog">
    <h2>場所単価</h2>
    <div id="settingsFields"></div>

    <section class="new-location-box">
      <h3>新しい場所を追加</h3>
      <div class="new-location-grid">
        <div>
          <label for="newLocationName">場所名</label>
          <input id="newLocationName" type="text" placeholder="例：横浜60F">
        </div>
        <div>
          <label for="newLocationPrice">単価</label>
          <input id="newLocationPrice" type="number" inputmode="numeric" min="0" step="100" placeholder="例：25000">
        </div>
      </div>
      <button id="addLocationBtn" class="add-location" type="button">＋ 場所と単価を追加</button>
    </section>
    <p class="small-note">追加・変更・削除はその場で自動保存されます。保存済み履歴の金額は変わりません。</p>
    <div class="modal-actions">
      <button class="action primary close-settings" value="cancel">閉じる</button>
    </div>
  </form>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@4.2.1/dist/jspdf.umd.min.js"></script>
<script src="app.js?v=2.3.0"></script>
</body>
</html>
